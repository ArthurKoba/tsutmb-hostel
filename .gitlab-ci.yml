build:production:
  <<: *build_base
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  script:
    - >
      docker buildx build
      --cache-from type=registry,ref=$CI_REGISTRY_IMAGE/cache:prod
      --cache-to type=registry,ref=$CI_REGISTRY_IMAGE/cache:prod,mode=max
      --build-arg ENV_TYPE=PRODUCTION
      -t $CI_REGISTRY_IMAGE/prod:latest
      -t $CI_REGISTRY_IMAGE/prod:$CI_COMMIT_SHA
      --push
      .