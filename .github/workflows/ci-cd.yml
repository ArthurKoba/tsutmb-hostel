name: CI/CD

on:
  push:
    branches: [ dev, master ]
  pull_request:
    branches: [ dev, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.ref_name != 'master' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Sync dependencies
      run: uv sync

    - name: Ruff check
      run: uv run ruff check src

    - name: Ruff format check
      run: uv run ruff format src --check

  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref_name == 'master'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/prod:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/prod:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:prod
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache:prod,mode=max
        build-args: |
          ENV_TYPE=PRODUCTION